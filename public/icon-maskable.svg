<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable: full-bleed background; safe zone is the inner 80% (centered ~410x410) -->
  <rect width="512" height="512" fill="#FFF8E7"/>
  <g transform="translate(106 106) scale(3.75)">
    <!-- 80x80 sun, scaled to fit 300x300 in the safe zone -->
    <circle cx="40" cy="40" r="20" fill="#FFD43B" stroke="#0F1729" stroke-width="5"/>
    <line x1="40" y1="14" x2="40" y2="4"  stroke="#0F1729" stroke-width="5" stroke-linecap="round"/>
    <line x1="40" y1="66" x2="40" y2="76" stroke="#0F1729" stroke-width="5" stroke-linecap="round"/>
    <line x1="14" y1="40" x2="4"  y2="40" stroke="#0F1729" stroke-width="5" stroke-linecap="round"/>
    <line x1="66" y1="40" x2="76" y2="40" stroke="#0F1729" stroke-width="5" stroke-linecap="round"/>
    <line x1="22" y1="22" x2="15" y2="15" stroke="#0F1729" stroke-width="5" stroke-linecap="round"/>
    <line x1="58" y1="58" x2="65" y2="65" stroke="#0F1729" stroke-width="5" stroke-linecap="round"/>
    <line x1="22" y1="58" x2="15" y2="65" stroke="#0F1729" stroke-width="5" stroke-linecap="round"/>
    <line x1="58" y1="22" x2="65" y2="15" stroke="#0F1729" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
